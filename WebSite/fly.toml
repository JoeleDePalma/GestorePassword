app = "gestorepassword-site"
primary_region = "fra"

[http_service]
  internal_port = 8043
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[[statics]]
  guest_path = "/public"
  url_prefix = "/"

[[statics]]
  guest_path = "/public/download"
  url_prefix = "/download"