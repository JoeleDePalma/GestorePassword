name: Build Avalonia for all platforms

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  # -------------------------
  # LINUX BUILD
  # -------------------------
  linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Publish single-file
      run: dotnet publish GestorePassword/GestorePassword.Desktop/GestorePassword.Desktop.csproj -c Release -r linux-x64 --self-contained true /p:PublishSingleFile=true -o output

    - name: Install AppImage tool
      run: |
        sudo apt-get update
        sudo apt-get install -y appimagetool

    - name: Create AppImage
      run: |
        mkdir AppDir
        cp -r output/* AppDir/
        appimagetool AppDir GestorePassword.AppImage

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-appimage
        path: GestorePassword.AppImage


  # -------------------------
  # WINDOWS BUILD
  # -------------------------
  windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Publish single-file
      run: dotnet publish GestorePassword/GestorePassword.Desktop/GestorePassword.Desktop.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true -o output

    - name: Install Inno Setup
      run: choco install innosetup -y
      shell: powershell

    - name: Create installer
      run: iscc installer.iss
      shell: powershell

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-installer
        path: Output/installer.exe


  # -------------------------
  # MACOS BUILD
  # -------------------------
  macos:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Publish single-file
      run: dotnet publish GestorePassword/GestorePassword.Desktop/GestorePassword.Desktop.csproj -c Release -r osx-x64 --self-contained true /p:PublishSingleFile=true -o output

    - name: Create .app bundle
      run: |
        mkdir -p GestorePassword.app/Contents/MacOS
        cp output/GestorePassword.Desktop GestorePassword.app/Contents/MacOS/
        chmod +x GestorePassword.app/Contents/MacOS/GestorePassword.Desktop

    - name: Create DMG
      run: |
        hdiutil create -volname GestorePassword -srcfolder GestorePassword.app -ov -format UDZO GestorePassword.dmg

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-dmg
        path: GestorePassword.dmg
