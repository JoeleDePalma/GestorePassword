name: Build Avalonia for all platforms

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  # -------------------------
  # LINUX BUILD
  # -------------------------
  linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Publish single-file
      run: dotnet publish GestorePassword/GestorePassword.Desktop/GestorePassword.Desktop.csproj -c Release -r linux-x64 --self-contained true /p:PublishSingleFile=true -o output

    - name: Create tar.gz
      run: tar -czvf GestorePassword-linux.tar.gz -C output .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-tar
        path: GestorePassword-linux.tar.gz


  # -------------------------
  # WINDOWS BUILD
  # -------------------------
  windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Publish single-file (NO COMPRESSION)
      run: dotnet publish GestorePassword/GestorePassword.Desktop/GestorePassword.Desktop.csproj -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true /p:EnableCompressionInSingleFile=false -o output

    - name: Install Inno Setup
      run: choco install innosetup -y
      shell: powershell

    - name: Build installer
      run: iscc installer.iss
      shell: powershell

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-installer
        path: Output/GestorePassword-Setup.exe


  # -------------------------
  # MACOS BUILD
  # -------------------------
  macos:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Publish single-file
      run: dotnet publish GestorePassword/GestorePassword.Desktop/GestorePassword.Desktop.csproj -c Release -r osx-x64 --self-contained true /p:PublishSingleFile=true -o output

    - name: Create .app bundle
      run: |
        mkdir -p GestorePassword.app/Contents/MacOS
        cp output/GestorePassword.Desktop GestorePassword.app/Contents/MacOS/
        chmod +x GestorePassword.app/Contents/MacOS/GestorePassword.Desktop

    - name: Zip .app
      run: zip -r GestorePassword-macOS.zip GestorePassword.app

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-zip
        path: GestorePassword-macOS.zip
